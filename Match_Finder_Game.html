<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💕 Match Finder 💕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:linear-gradient(135deg,#FFE8F2,#E8F8FF,#FFF6D9);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;overflow:hidden}
.card{width:100%;max-width:380px;background:#fff;border-radius:25px;padding:25px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.15)}
.hidden{display:none}
h1{color:#ff6fa4;margin-bottom:15px}p{color:#777;margin-bottom:15px}
input{width:100%;padding:13px;margin:10px 0;border:none;border-radius:15px;background:#f7f7f7}
button{background:#FFB6D5;color:#fff;border:none;padding:14px 28px;border-radius:20px;font-size:18px;cursor:pointer}
.img-box{
    width:100%;
    height:170px;
    border-radius:20px;
    overflow:hidden;          /* Keeps image inside rounded corners */
    margin-bottom:20px;
    border:3px solid #ffc7df;
    background:#fff8fb;
    display:flex;
    justify-content:center;
    align-items:center;
}

.img-box img{
    width:100%;
    height:100%;
    object-fit:cover;         /* Fills the box without distortion */
    display:block;
}
.big{font-size:60px;color:#ff5f9d;font-weight:bold;margin:20px 0}
.answers label{margin:0 15px;font-size:22px}
.answers input{width:auto}
.confetti{position:fixed;width:10px;height:10px;top:-20px;pointer-events:none}
</style>
</head>
<body>
<div class="card">
<div id="page1">
<div class="img-box">
    <img src="images/bouqet.jpg" alt="Start">
</div>

<h1>💕 Match Finder 💕</h1><p>תענה על השאלון כדי למצוא את הזוג שלך לנשף!</p><button onclick="nextPage(2)">התחל</button></div>

<div id="page2" class="hidden"><div class="img-box"><img src="images/writing.jpg" alt="Start"></div><h1>מה השם שלך?</h1><input><button onclick="nextPage(3)">הבא</button></div>

<div id="page3" class="hidden"><div class="img-box"><img src="images/cake.jpg" alt="Start"></div><h1>בן/בת כמה את/ה?</h1><input type="number"><button onclick="nextPage(4)">הבא</button></div>

<div id="page4" class="hidden"><div class="img-box"><img src="images/color.jpg" alt="Start"></div><h1>מה הצבע האהוב עליך?</h1><input><button onclick="nextPage(5)">הבא</button></div>

<div id="page5" class="hidden"><div class="img-box"><img src="images/meme.jpg" alt="Start"></div><h1>🥳 יש לך זוג לנשף!!</h1><button onclick="nextPage(6)">לגלות מי זה</button></div>

<div id="page6" class="hidden"><div class="img-box"><img src="images/me.jpeg" alt="Start"></div><div class="big">אני! 💕</div><p>את/ה מסכים/ה?</p><div class="answers"><label><input type="checkbox" onclick="yesClicked()">כן</label><label id="noLabel"><input type="checkbox" onclick="document.getElementById('noLabel').style.display='none'">לא</label></div></div>

</div>
<script>
function nextPage(n){for(const d of document.querySelectorAll('.card>div'))d.classList.add('hidden');document.getElementById('page'+n).classList.remove('hidden')}
function yesClicked(){const colors=['#ff6fa4','#ffd1dc','#a0e7ff','#fff6a0','#cdb4ff','#b8f2e6'];for(let i=0;i<150;i++){let c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=colors[Math.floor(Math.random()*colors.length)];document.body.appendChild(c);let x=(Math.random()-.5)*300;let dur=2500+Math.random()*1500;c.animate([{transform:'translateY(0)'},{transform:`translate(${x}px,110vh) rotate(720deg)`}],{duration:dur,easing:'ease-out'});setTimeout(()=>c.remove(),dur);}}
</script>
</body>
</html>
